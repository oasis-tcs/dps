assembly:
  binder: bind.txt
  source-path: src
  build-path: build
  etc-path: etc
  first-authored-section: '# Scope'
  binder-ignores:
    gfm-plus: []
    html: []
    pdf:
    - frontmatter.md
  delete-when:
  - contains: '<mark title="Ephemeral region marking">'
    delete:
    - '<mark title="Ephemeral region marking">'
    - '</mark>'

structure:
  section-type-prefixes: [Annex, Appendix]

enumeration:
  sections:
    l1-dot: true
    sub-dot: false
    reference-style: number-title
    lut:
      label-to-display: section-label-to-display.json
      display-to-label: section-display-to-label.json
      display-to-text: section-display-to-text.json
  examples:
    track: true
    global-start: 4321
    lut:
      local-to-global: example-local-to-global.json
      global-to-local: example-global-to-local.json

references:
  citations:
    sources:
    - references-01-normative-01-def-list.md
    - references-02-informative-01-def-lst.md
    skip-prefixes:
    - '#'
    keyword: cite
  sections:
    keyword: sec
  glossary:
    sources:
    - defs-and-acro-01-defs-ext-01-list.md

channels:
  html:
    title: Data Provenance Metadata Version 1.0
    inject:
      css-base: ../share/style/base.css
      css-skin: ../share/style/skin.css
      images: true
      images-path: build/data-url
      intro-trigger: '<h1 id="1-scope'
      logo-data-url: ../media/logo-data-url.txt
      logo-remote-url: 'https://docs.oasis-open.org/templates/OASISLogo-v3.0.png'
      toc-trigger: '<h1 id="table-of-contents'
  pdf:
    logo-local-path: images/OASISLogo-v3.0.png
    logo-remote-url: 'https://docs.oasis-open.org/templates/OASISLogo-v3.0.png'
  typst:
    page-break-l1: true
