meta:
  name: dps-prov-meta-spec-rules
  description: >-
    DPS prov-meta-1.0 specification-level quality rules.
    Extends the shared OASIS baseline (oasis.rules.yaml) and adds DPS-specific checks.
    Run with: nide quality --rules etc/rules/spec.rules.yaml
  extends: oasis

context:
  tc-name: dps
  spec-name: prov-meta
  spec-version: "1.0"
  stage: csd02
  doc-url-base: https://docs.oasis-open.org/dps/prov-meta/v1.0

rules:

  # ── DPS prov-meta spec-specific checks ────────────────────────────────────

  - id: DPS-TITLE
    severity: BLOCKER
    description: The document title must identify the spec by name
    check:
      type: section-present
      pattern: 'Data Provenance Metadata'
      flags: IGNORECASE

  - id: DPS-STAGE-HEADING
    severity: WARN
    description: >-
      A publication-stage heading (Committee Specification Draft, Committee
      Specification, etc.) must appear in the front matter
    check:
      type: section-present
      pattern: 'Committee Specification Draft|Committee Specification|Candidate OASIS Standard|OASIS Standard'
      flags: IGNORECASE

  - id: DPS-THIS-VERSION
    severity: BLOCKER
    description: A 'This version' heading must be present in the front matter
    check:
      type: section-present
      pattern: 'This version'
      flags: IGNORECASE

  - id: DPS-LATEST-VERSION
    severity: WARN
    description: A 'Latest version' heading must be present in the front matter
    check:
      type: section-present
      pattern: 'Latest version'
      flags: IGNORECASE

  - id: DPS-TC-LINK
    severity: WARN
    description: >-
      A link to the DPS TC community page should appear in the front matter
    check:
      type: any-match
      target: links
      pattern: 'oasis-open\.org.*dps|groups\.oasis-open\.org.*communities'
      flags: IGNORECASE

  - id: DPS-DOC-URL
    severity: WARN
    description: >-
      At least one this-version URL under docs.oasis-open.org/dps/prov-meta
      must appear in the front matter
    check:
      type: any-match
      target: links
      pattern: 'docs\.oasis-open\.org/dps/prov-meta'
      flags: IGNORECASE

  - id: DPS-SAFETY-SECURITY
    severity: WARN
    description: >-
      A Safety, Security and Data Protection section must be present
      (OASIS best practice for all Standards Track Work Products)
    check:
      type: section-present
      pattern: 'Safety.*Security|Security.*Safety'
      flags: IGNORECASE

  - id: DPS-REFERENCES-ANNEX
    severity: BLOCKER
    description: >-
      A top-level References section must be present. The annex counter
      (e.g. "Annex B.") is stored in sec_cnt_disp in the IR and is NOT
      part of HeadingNode.text — match the base heading text only.
    check:
      type: section-present
      pattern: '^References$'
      flags: IGNORECASE

  - id: DPS-NORMATIVE-REFS
    severity: BLOCKER
    description: A Normative References subsection must be present
    check:
      type: section-present
      pattern: 'Normative References'
      flags: IGNORECASE

  - id: DPS-INFORMATIVE-REFS
    severity: WARN
    description: An Informative References subsection should be present
    check:
      type: section-present
      pattern: 'Informative References'
      flags: IGNORECASE

  - id: DPS-LICENSE-ANNEX
    severity: BLOCKER
    description: >-
      A License, Document Status and Notices annex must be present
      (mandatory OASIS content)
    check:
      type: section-present
      pattern: 'License.*Notices|Notices.*License|Document Status'
      flags: IGNORECASE

  - id: DPS-EXAMPLES-ANNEX
    severity: WARN
    description: An Example Instances annex should be present
    check:
      type: section-present
      pattern: 'Example Instances?'
      flags: IGNORECASE

  - id: DPS-ACKNOWLEDGMENTS
    severity: WARN
    description: An Acknowledgments appendix should be present
    check:
      type: section-present
      pattern: '^Acknowledgments?$'
      flags: IGNORECASE

  - id: DPS-CHANGES-APPENDIX
    severity: WARN
    description: A Changes From Previous Version appendix should be present
    check:
      type: section-present
      pattern: 'Changes From Previous Version'
      flags: IGNORECASE

  - id: DPS-KEY-WORDS-SECTION
    severity: WARN
    description: >-
      A Key Words subsection under Document Conventions must be present
      (standard location for RFC 2119 boilerplate)
    check:
      type: section-present
      pattern: 'Key Words'
      flags: IGNORECASE

  - id: DPS-DEFINITIONS-SECTION
    severity: WARN
    description: >-
      A Definitions and Abbreviations section (or equivalent) must be present
    check:
      type: section-present
      pattern: 'Definitions|Terms and Definitions'
      flags: IGNORECASE

  # Note: references-resolve is omitted from this file because prov-meta uses
  # [cite](#RFC2119) citation links throughout. Citation fragment IDs are not
  # section labels, so references-resolve would produce false positives.
  # Use 'nide harvest' and inspect the section LUTs to verify section links.
